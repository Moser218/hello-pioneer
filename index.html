<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Pioneer Species</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 2.5rem; }
    textarea { width: 100%; height: 80px; font-size: 1rem; padding: 8px; box-sizing: border-box; }
    input[type="text"] { width: 100%; font-size: 1rem; padding: 8px; box-sizing: border-box; margin-bottom: 8px; }
    button { margin-top: 8px; padding: 8px 20px; font-size: 1rem; cursor: pointer; }
    #notes { margin-top: 32px; }
    .note { border-bottom: 1px solid #eee; padding: 12px 0; }
    .note strong { display: block; margin-bottom: 4px; }
    .note span { color: #555; display: block; margin-bottom: 8px; }
    .share-btn { margin-top: 4px; padding: 4px 12px; font-size: 0.8rem; cursor: pointer; background: #fff; border: 1px solid #ccc; border-radius: 4px; }
    .share-btn:disabled { color: #aaa; cursor: default; }
    .activity { margin: 8px 0; display: flex; flex-direction: column; gap: 4px; }
    .activity-row { display: flex; align-items: center; gap: 8px; font-size: 0.78rem; }
    .activity-recipient { color: #555; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .activity-time { color: #aaa; white-space: nowrap; }
    .activity-badge { padding: 2px 7px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
    .activity-badge--sent { background: #e8f4fd; color: #1a73e8; }
    .activity-badge--opened { background: #e6f4ea; color: #1e8e3e; }
    .activity-badge--clicked { background: #fce8b2; color: #b06000; }
    .activity-badge--bounced { background: #fce8e6; color: #c5221f; }
  </style>
</head>
<body>
  <h1>hello from Pioneer Species</h1>

  <input type="text" id="title" placeholder="Title" />
  <textarea id="body" placeholder="Write a note..."></textarea>
  <button id="submit">Post Note</button>

  <div id="notes"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
